<desc style="fill:rgb(0, 0, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">폭풍 공개, 협상, 비밀 기여, 판정, 사적 축적의 다섯 단계 루프와 협력의 바닥, 경쟁의 천장이라는 두 균형 장치</desc>
